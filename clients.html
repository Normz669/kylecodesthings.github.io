<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Portal // Kyle Norman</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0a0a0a;
        color: #e8e8e8;
        font-family: "JetBrains Mono", monospace;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        padding: 40px 20px;
      }
      .label {
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        color: #444;
        text-transform: uppercase;
      }
      h1 {
        font-size: 1.2rem;
        letter-spacing: 0.15em;
        color: #aaff00;
      }
      .cards {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 400px;
      }
      .card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #111;
        border: 1px solid #222;
        border-radius: 6px;
        padding: 20px 24px;
        text-decoration: none;
        color: #e8e8e8;
        font-size: 0.85rem;
        letter-spacing: 0.1em;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .card:hover {
        border-color: #aaff00;
        color: #aaff00;
      }
      .card-arrow {
        color: #aaff00;
      }
      .footer {
        font-size: 0.65rem;
        color: #333;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div class="label">// Client Portal</div>
    <h1>KN.dev</h1>
    <div class="cards">
      <a
        href="https://web-production-6f501.up.railway.app"
        class="card"
        target="_blank"
      >
        <span>Freshener Costing</span>
        <span class="card-arrow">→</span>
      </a>
    </div>
    <div class="footer">kylecodesthings.co.za</div>
  </body>
</html>
